<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananth | Engineer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CORE VARIABLES
           ========================================= */
        :root {
            --bg: #000000;
            --surface: #0f0f0f;
            --border: #222;
            --text-main: #ededed;
            --text-muted: #888;
            --accent: #2ea44f; /* GitHub Green */
            --spotlight: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Manrope', sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 { margin: 0; letter-spacing: -0.02em; }
        
        /* CONTAINER */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* =========================================
           HERO SECTION (CSS Animation)
           ========================================= */
        .hero-section {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .hero-text {
            font-size: 14vw;
            font-weight: 800;
            line-height: 0.9;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Animation */
            opacity: 0;
            transform: translateY(50px);
            animation: heroReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .hero-sub {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-top: 20px;
            /* Animation */
            opacity: 0;
            animation: fadeUp 1s ease 0.5s forwards;
        }

        .btn-group { 
            margin-top: 40px; 
            display: flex; 
            gap: 15px; 
            opacity: 0; 
            animation: fadeUp 1s ease 0.8s forwards; 
        }

        /* =========================================
           THE "CRED" CARDS (Spotlight + Tilt)
           ========================================= */
        .card-grid {
            display: grid;
            gap: 24px;
            position: relative;
        }

        .interactive-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            transition: transform 0.1s;
            margin-bottom: 24px;
            
            /* FIX: Make sure it's visible by default */
            opacity: 1; 
            
            /* Spotlight Variables */
            --mouse-x: 0px;
            --mouse-y: 0px;
        }

        /* The Glow Effect layer */
        .interactive-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(
                800px circle at var(--mouse-x) var(--mouse-y),
                var(--spotlight),
                transparent 40%
            );
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 1;
        }

        .interactive-card:hover::before {
            opacity: 1;
        }
        
        .card-content {
            position: relative;
            z-index: 2;
        }

        #tilt-card {
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* =========================================
           DASHBOARD ELEMENTS
           ========================================= */
        .section-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 40px;
            margin-top: 100px;
            color: #333;
        }
        .section-title span { color: #fff; }

        .metric-row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(46, 164, 79, 0.1);
            color: #2ea44f;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .pulse {
            width: 8px; height: 8px;
            background: #2ea44f;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(46, 164, 79, 0.7);
            animation: pulse-green 2s infinite;
        }

        /* PROGRESS BAR */
        .progress-container {
            height: 4px;
            background: #222;
            border-radius: 2px;
            width: 100%;
            margin-top: 30px;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: #fff;
            width: 0%; /* JS will fill this */
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* BUTTONS */
        .btn {
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        .btn-ghost { border: 1px solid #333; color: #fff; }
        .btn-ghost:hover { border-color: #fff; }

        /* SKILL TAGS */
        .skill-tag {
            border: 1px solid #333;
            color: #ccc;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            display: inline-block;
            margin: 0 4px 8px 0;
            transition: 0.3s;
        }
        .skill-tag:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }

        /* =========================================
           ANIMATIONS
           ========================================= */
        @keyframes heroReveal { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 164, 79, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 164, 79, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 164, 79, 0); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hero-text { font-size: 20vw; }
            .metric-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <section class="hero-section container">
        <p class="hero-sub" style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 20px;">
            Software Engineer
        </p>
        <h1 class="hero-text">ANANTH</h1>
        
        <p class="hero-sub" style="max-width: 500px; line-height: 1.6;">
            Building scalable systems and analyzing data at high velocity.
        </p>

        <div class="btn-group">
            <a href="./resume.pdf" target="_blank" class="btn btn-primary">Resume</a>
            <a href="https://github.com/ananth9911" target="_blank" class="btn btn-ghost">GitHub</a>
        </div>
    </section>

    <section class="container">
        <h2 class="section-title">System <span>Velocity</span></h2>
