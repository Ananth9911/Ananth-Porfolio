<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananth | Engineer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CORE VARIABLES
           ========================================= */
        :root {
            --bg: #050505;
            --surface: #121212;
            --border: #222;
            --text-main: #ededed;
            --text-muted: #888;
            --accent: #2ea44f;
            --spotlight: rgba(255, 255, 255, 0.06);
        }

        /* RESET & SCROLL FIXES */
        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden; /* Prevents side scroll */
            overflow-y: auto;   /* Forces vertical scroll */
        }

        h1, h2, h3 { margin: 0; letter-spacing: -0.02em; }
        p { line-height: 1.6; }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* =========================================
           HERO SECTION
           ========================================= */
        .hero-section {
            padding: 120px 0 80px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-text {
            font-size: 12vw; /* Responsive huge text */
            font-weight: 800;
            line-height: 0.9;
            background: linear-gradient(to bottom, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .hero-text { font-size: 6rem; } /* Cap size on desktop */
        }

        .hero-sub {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 500px;
        }

        .btn-group { 
            margin-top: 40px; 
            display: flex; 
            gap: 15px; 
        }

        /* =========================================
           CARDS (Stable Glow)
           ========================================= */
        .card-grid {
            display: grid;
            gap: 24px;
        }
        
        @media (min-width: 768px) {
            .card-grid-2 { grid-template-columns: 1fr 1fr; }
        }

        .interactive-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            overflow: hidden; /* Keeps glow inside */
            transition: transform 0.2s ease, border-color 0.2s;
            margin-bottom: 24px;
            
            /* Spotlight Initials */
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        .interactive-card:hover {
            border-color: #333;
            transform: translateY(-2px);
        }

        /* The Glow Effect Layer */
        .interactive-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(
                600px circle at var(--mouse-x) var(--mouse-y),
                var(--spotlight),
                transparent 40%
            );
            opacity: 0; /* Hidden by default */
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1;
        }

        .interactive-card:hover::before {
            opacity: 1; /* Show on hover */
        }
        
        /* Content z-index fix */
        .card-content {
            position: relative;
            z-index: 2;
        }

        /* =========================================
           DASHBOARD METRICS
           ========================================= */
        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 80px 0 40px 0;
            color: #333;
        }
        .section-title span { color: #fff; }

        .metric-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(46, 164, 79, 0.1);
            color: #2ea44f;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .pulse {
            width: 8px; height: 8px;
            background: #2ea44f;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(46, 164, 79, 0.7);
            animation: pulse-green 2s infinite;
        }

        /* PROGRESS BAR */
        .progress-container {
            height: 4px;
            background: #222;
            border-radius: 2px;
            width: 100%;
            margin-top: 30px;
        }
        .progress-bar {
            height: 100%;
            background: #fff;
            width: 15%; /* Static width for stability */
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* BUTTONS */
        .btn {
            padding: 12px 28px;
            border-radius: 100px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-ghost { border: 1px solid #333; color: #fff; }
        .btn-ghost:hover { border-color: #fff; }

        /* TAGS */
        .skill-tag {
            border: 1px solid #333;
            color: #ccc;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            display: inline-block;
            margin: 0
